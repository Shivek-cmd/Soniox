services:
  voice-server:
    build:
      context: ./soniox_examples/apps/soniox-voice-bot-demo
      dockerfile: server/Dockerfile
    environment:
      - SONIOX_API_KEY=${SONIOX_API_KEY}
      - SONIOX_STT_MODEL=${SONIOX_STT_MODEL:-stt-rt-v4}
      - SONIOX_TTS_MODEL=${SONIOX_TTS_MODEL:-tts-rt-v1}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - LLM_TEMPERATURE=${LLM_TEMPERATURE:-0.85}
      - LLM_MAX_TOKENS=${LLM_MAX_TOKENS:-200}
      - WEBSOCKET_HOST=0.0.0.0
      - WEBSOCKET_PORT=8765
      - N8N_WEBHOOK_URL=${N8N_WEBHOOK_URL:-}
      # Clover POS
      - CLOVER_BASE_URL=${CLOVER_BASE_URL}
      - CLOVER_MERCHANT_ID=${CLOVER_MERCHANT_ID}
      - CLOVER_ACCESS_TOKEN=${CLOVER_ACCESS_TOKEN}
      - CLOVER_REFRESH_TOKEN=${CLOVER_REFRESH_TOKEN:-}
      - CLOVER_WEBHOOK_SECRET=${CLOVER_WEBHOOK_SECRET}
      - CLOVER_MENU_POLL_INTERVAL=${CLOVER_MENU_POLL_INTERVAL:-300}
      # Square POS
      - SQUARE_BASE_URL=${SQUARE_BASE_URL:-https://connect.squareupsandbox.com}
      - SQUARE_ACCESS_TOKEN=${SQUARE_ACCESS_TOKEN:-}
      - SQUARE_LOCATION_ID=${SQUARE_LOCATION_ID:-}
    restart: unless-stopped

  twilio-bridge:
    build:
      context: ./soniox_examples/apps/soniox-voice-bot-demo/twilio
    environment:
      - SONIOX_VOICE_BOT_WS_URL=ws://voice-server:8765
      - VOICE_SERVER_INTERNAL_URL=http://voice-server:8765
      - VOICE_BOT_LANGUAGE=${VOICE_BOT_LANGUAGE:-pa}
      - VOICE_BOT_VOICE=${VOICE_BOT_VOICE:-Maya}
      - OPENING_GREETING_AUDIO_PATH=assets/opening_greeting.wav
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
      - TWILIO_NUMBER=${TWILIO_NUMBER}
      - YOUR_NUMBER=${YOUR_NUMBER}
      - OWNER_PHONE_NUMBER=${OWNER_PHONE_NUMBER}
      - NGROK_URL=${NGROK_URL}
      # Clover webhook validation (must match CLOVER_WEBHOOK_SECRET above)
      - CLOVER_WEBHOOK_SECRET=${CLOVER_WEBHOOK_SECRET}
    depends_on:
      - voice-server
    restart: unless-stopped

  store-api:
    build:
      context: ./soniox_examples/apps/soniox-voice-bot-demo/store-api
    environment:
      - CLOVER_BASE_URL=${CLOVER_BASE_URL}
      - CLOVER_MERCHANT_ID=${CLOVER_MERCHANT_ID}
      - CLOVER_ACCESS_TOKEN=${CLOVER_ACCESS_TOKEN}
      - CLOVER_ECOM_KEY=${CLOVER_ECOM_KEY:-}
      - FRONTEND_URL=${FRONTEND_URL:-https://voice.bizbull.ai}
      # Square POS
      - SQUARE_BASE_URL=${SQUARE_BASE_URL:-https://connect.squareupsandbox.com}
      - SQUARE_ACCESS_TOKEN=${SQUARE_ACCESS_TOKEN:-}
      - SQUARE_LOCATION_ID=${SQUARE_LOCATION_ID:-}
    restart: unless-stopped

  frontend:
    build:
      context: ./soniox_examples/apps/soniox-voice-bot-demo
      dockerfile: frontend/Dockerfile
      args:
        VITE_SONIOX_VOICE_BOT_WS_URL: wss://voice.bizbull.ai/ws
    depends_on:
      - voice-server
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    dns:
      - 8.8.8.8
      - 8.8.4.4
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
    depends_on:
      - twilio-bridge
      - frontend
      - store-api
    restart: unless-stopped

volumes:
  caddy_data:

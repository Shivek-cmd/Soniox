services:
  voice-server:
    build:
      context: ./soniox_examples/apps/soniox-voice-bot-demo/server
    environment:
      - SONIOX_API_KEY=${SONIOX_API_KEY}
      - SONIOX_STT_MODEL=${SONIOX_STT_MODEL:-stt-rt-v4}
      - SONIOX_TTS_MODEL=${SONIOX_TTS_MODEL:-tts-rt-v1}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - LLM_TEMPERATURE=${LLM_TEMPERATURE:-0.85}
      - LLM_MAX_TOKENS=${LLM_MAX_TOKENS:-200}
      - WEBSOCKET_HOST=0.0.0.0
      - WEBSOCKET_PORT=8765
      - N8N_WEBHOOK_URL=${N8N_WEBHOOK_URL:-}
    restart: unless-stopped

  twilio-bridge:
    build:
      context: ./soniox_examples/apps/soniox-voice-bot-demo/twilio
    environment:
      - SONIOX_VOICE_BOT_WS_URL=ws://voice-server:8765
      - VOICE_BOT_LANGUAGE=pa
      - VOICE_BOT_VOICE=Nina
      - OPENING_GREETING_AUDIO_PATH=${OPENING_GREETING_AUDIO_PATH:-}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
      - OWNER_PHONE_NUMBER=${OWNER_PHONE_NUMBER}
      - NGROK_URL=${NGROK_URL}
    depends_on:
      - voice-server
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    dns:
      - 8.8.8.8
      - 8.8.4.4
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
    depends_on:
      - twilio-bridge
    restart: unless-stopped

volumes:
  caddy_data:
